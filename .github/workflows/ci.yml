name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

# We can build but not run on GitHub because we do not have the Pylon SDK
# available. Loading the shim library will fail, but we want to make sure that the
# code at least compiles.

jobs:
  build:
    name: Build
    strategy:
      matrix:
        runs-on: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Build
        run: cargo test --all-features --no-run

